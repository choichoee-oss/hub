<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATON 비서 업무 허브</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --accent: #7C6FE0;
    --accent-dark: #5A4FC0;
    --accent-light: #EEECfC;
    --bg: #F2F1F7;
    --card-bg: #FFFFFF;
    --text-main: #1A1A2E;
    --text-sub: #888899;
    --shadow: 0 8px 32px rgba(124,111,224,0.10);
    --shadow-hover: 0 16px 48px rgba(124,111,224,0.22);
    --radius: 24px;
  }

  body {
    font-family: 'Noto Sans KR', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ─── MAIN SCREEN ─── */
  #home-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 3rem 2rem;
    transition: opacity 0.35s, transform 0.35s;
  }

  .home-header {
    text-align: center;
    margin-bottom: 3.5rem;
  }

  .home-header .logo-badge {
    display: inline-block;
    background: var(--accent);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.15em;
    padding: 5px 14px;
    border-radius: 100px;
    margin-bottom: 1.2rem;
  }

  .home-header h1 {
    font-size: 2rem;
    font-weight: 700;
    color: var(--text-main);
    letter-spacing: -0.03em;
    line-height: 1.2;
  }

  .home-header h1 span {
    display: block;
    width: 40px;
    height: 4px;
    background: var(--accent);
    border-radius: 2px;
    margin: 0.8rem auto 0;
  }

  /* ─── CARD GRID ─── */
  .card-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1.25rem;
    max-width: 860px;
    width: 100%;
  }

  @media (max-width: 700px) {
    .card-grid { grid-template-columns: repeat(2, 1fr); }
    .home-header h1 { font-size: 1.5rem; }
  }

  .app-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 2.2rem 1.2rem 1.8rem;
    text-align: center;
    cursor: pointer;
    transition:
      transform 0.28s cubic-bezier(0.34, 1.56, 0.64, 1),
      box-shadow 0.28s ease,
      background 0.22s ease;
    box-shadow: var(--shadow);
    position: relative;
    overflow: hidden;
    user-select: none;
  }

  .app-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--accent);
    opacity: 0;
    transition: opacity 0.22s ease;
    border-radius: var(--radius);
  }

  .app-card:hover {
    transform: translateY(-8px) scale(1.03);
    box-shadow: var(--shadow-hover);
  }

  .app-card:hover::before { opacity: 0.06; }

  .app-card:active {
    transform: translateY(-4px) scale(1.01);
  }

  .app-card.active {
    background: var(--accent);
    box-shadow: var(--shadow-hover);
    transform: translateY(-6px) scale(1.04);
  }

  .app-card.active::before { opacity: 0; }

  .card-icon {
    width: 58px;
    height: 58px;
    border-radius: 16px;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.1rem;
    transition: background 0.22s;
    position: relative;
    z-index: 1;
  }

  .card-icon svg {
    width: 26px;
    height: 26px;
    stroke: var(--accent);
    transition: stroke 0.22s;
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .app-card.active .card-icon {
    background: rgba(255,255,255,0.22);
  }

  .app-card.active .card-icon svg {
    stroke: #fff;
  }

  .card-label {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--text-main);
    line-height: 1.45;
    position: relative;
    z-index: 1;
    transition: color 0.22s;
    word-break: keep-all;
  }

  .app-card.active .card-label { color: #fff; }

  .card-sub {
    font-size: 11px;
    color: var(--text-sub);
    margin-top: 0.3rem;
    position: relative;
    z-index: 1;
    transition: color 0.22s;
  }

  .app-card.active .card-sub { color: rgba(255,255,255,0.7); }

  /* ─── APP SCREEN (iframe view) ─── */
  #app-screen {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    opacity: 0;
    transform: translateY(18px);
    transition: opacity 0.35s, transform 0.35s;
  }

  #app-screen.visible {
    opacity: 1;
    transform: translateY(0);
  }

  .app-topbar {
    background: #fff;
    border-bottom: 1px solid #EEEEF5;
    padding: 0 1.5rem;
    height: 56px;
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-shrink: 0;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .back-btn {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-light);
    color: var(--accent-dark);
    border: none;
    border-radius: 100px;
    padding: 7px 16px 7px 12px;
    font-size: 13px;
    font-weight: 500;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.18s, transform 0.18s;
  }

  .back-btn:hover {
    background: #DDD9F8;
    transform: translateX(-2px);
  }

  .back-btn svg {
    width: 15px;
    height: 15px;
    stroke: var(--accent-dark);
    fill: none;
    stroke-width: 2.2;
    stroke-linecap: round;
    stroke-linejoin: round;
    flex-shrink: 0;
  }

  .topbar-title {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-main);
  }

  .topbar-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--accent);
    flex-shrink: 0;
  }

  #app-frame {
    flex: 1;
    border: none;
    width: 100%;
    height: calc(100vh - 56px);
  }

  /* ─── FOOTER ─── */
  .home-footer {
    margin-top: 3rem;
    font-size: 11.5px;
    color: var(--text-sub);
    letter-spacing: 0.04em;
  }

  /* ─── PASSWORD MODAL ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26, 26, 46, 0.45);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    z-index: 200;
    align-items: center;
    justify-content: center;
  }

  .modal-overlay.open {
    display: flex;
  }

  .modal-card {
    background: var(--card-bg);
    border-radius: var(--radius);
    padding: 2.8rem 2.4rem 2.4rem;
    width: 100%;
    max-width: 340px;
    box-shadow: 0 24px 64px rgba(124,111,224,0.22);
    text-align: center;
    animation: modalIn 0.32s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.88) translateY(16px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-icon {
    width: 62px;
    height: 62px;
    border-radius: 18px;
    background: var(--accent-light);
    display: flex;
    align-items: center;
    justify-content: center;
    margin: 0 auto 1.4rem;
  }

  .modal-icon svg {
    width: 28px;
    height: 28px;
    stroke: var(--accent);
    fill: none;
    stroke-width: 1.8;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .modal-title {
    font-size: 16px;
    font-weight: 700;
    color: var(--text-main);
    margin-bottom: 0.3rem;
  }

  .modal-desc {
    font-size: 12px;
    color: var(--text-sub);
    margin-bottom: 1.6rem;
  }

  .modal-input {
    width: 100%;
    padding: 13px 16px;
    border: 2px solid #EEEEF5;
    border-radius: 14px;
    font-size: 20px;
    font-family: 'Noto Sans KR', sans-serif;
    letter-spacing: 0.5em;
    text-align: center;
    color: var(--text-main);
    outline: none;
    transition: border-color 0.18s;
    background: var(--bg);
  }

  .modal-input:focus {
    border-color: var(--accent);
    background: #fff;
  }

  .modal-error {
    font-size: 12px;
    color: #E05C5C;
    margin-top: 0.6rem;
    min-height: 18px;
    transition: opacity 0.2s;
  }

  .modal-btn {
    width: 100%;
    margin-top: 1.2rem;
    padding: 14px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 700;
    font-family: 'Noto Sans KR', sans-serif;
    cursor: pointer;
    transition: background 0.18s, transform 0.18s;
  }

  .modal-btn:hover {
    background: var(--accent-dark);
    transform: translateY(-1px);
  }

  .modal-btn:active {
    transform: translateY(0);
  }

  .modal-cancel {
    margin-top: 0.9rem;
    font-size: 12px;
    color: var(--text-sub);
    cursor: pointer;
    display: inline-block;
    padding: 4px 8px;
    border-radius: 8px;
    transition: color 0.15s;
  }

  .modal-cancel:hover { color: var(--accent); }

  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20%       { transform: translateX(-8px); }
    40%       { transform: translateX(8px); }
    60%       { transform: translateX(-6px); }
    80%       { transform: translateX(6px); }
  }

  .shake { animation: shake 0.38s ease; }
</style>
</head>
<body>

<!-- ① 홈 화면 -->
<div id="home-screen">
  <div class="home-header">
    <div class="logo-badge">ATON SECRETARY HUB</div>
    <h1>업무 허브에 오신 것을 환영합니다<span></span></h1>
  </div>

  <div class="card-grid">

    <!-- 카드 1: 업무 대시보드 -->
    <div class="app-card" onclick="openApp('업무대시보드.html', '업무 대시보드', this)">
      <div class="card-icon">
        <svg viewBox="0 0 24 24">
          <rect x="3" y="3" width="7" height="7" rx="1.5"/>
          <rect x="14" y="3" width="7" height="7" rx="1.5"/>
          <rect x="3" y="14" width="7" height="7" rx="1.5"/>
          <rect x="14" y="14" width="7" height="7" rx="1.5"/>
        </svg>
      </div>
      <div class="card-label">업무 대시보드</div>
      <div class="card-sub">일정 · 현황 한눈에</div>
    </div>

    <!-- 카드 2: 공지 생성기 -->
    <div class="app-card" onclick="openApp('공지생성기.html', '공지 생성기', this)">
      <div class="card-icon">
        <svg viewBox="0 0 24 24">
          <path d="M18 8a6 6 0 0 1-6 6H6l-3 3V8a6 6 0 0 1 6-6h3"/>
          <circle cx="18" cy="5" r="3"/>
        </svg>
      </div>
      <div class="card-label">공지 생성기</div>
      <div class="card-sub">임원 · 임직원 공지</div>
    </div>

    <!-- 카드 3: 선물 목록 관리 -->
    <div class="app-card" onclick="openApp('선물목록명단관리.html', '선물 목록 및 명단 관리', this)">
      <div class="card-icon">
        <svg viewBox="0 0 24 24">
          <polyline points="20 12 20 22 4 22 4 12"/>
          <rect x="2" y="7" width="20" height="5" rx="1"/>
          <line x1="12" y1="22" x2="12" y2="7"/>
          <path d="M12 7H7.5a2.5 2.5 0 0 1 0-5C11 2 12 7 12 7z"/>
          <path d="M12 7h4.5a2.5 2.5 0 0 0 0-5C13 2 12 7 12 7z"/>
        </svg>
      </div>
      <div class="card-label">선물 목록 · 명단</div>
      <div class="card-sub">수·발신 선물 관리</div>
    </div>

    <!-- 카드 4: 계열사 임원 관리 -->
    <div class="app-card" onclick="openApp('계열사임원관리.html', '계열사 임원 관리', this)">
      <div class="card-icon">
        <svg viewBox="0 0 24 24">
          <rect x="2" y="7" width="20" height="15" rx="2"/>
          <path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/>
          <line x1="12" y1="12" x2="12" y2="16"/>
          <line x1="8" y1="14" x2="16" y2="14"/>
        </svg>
      </div>
      <div class="card-label">계열사 임원 관리</div>
      <div class="card-sub">임원 현황 · 연락처</div>
    </div>

    <!-- 카드 5: 의장님·가족 정보 -->
    <div class="app-card" onclick="openApp('의장님가족정보.html', '의장님 · 가족 정보', this)">
      <div class="card-icon">
        <svg viewBox="0 0 24 24">
          <circle cx="9" cy="7" r="3"/>
          <path d="M3 21v-2a4 4 0 0 1 4-4h4a4 4 0 0 1 4 4v2"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
          <path d="M21 21v-2a4 4 0 0 0-3-3.85"/>
        </svg>
      </div>
      <div class="card-label">의장님 · 가족 정보</div>
      <div class="card-sub">인적사항 · 가족관계</div>
    </div>

    <!-- 카드 6: 계정·ID/PW 관리 -->
    <div class="app-card" onclick="openApp('계정관리.html', '계정 · ID/PW 관리', this)">
      <div class="card-icon">
        <svg viewBox="0 0 24 24">
          <circle cx="8" cy="15" r="4"/>
          <line x1="11.5" y1="11.5" x2="22" y2="1"/>
          <line x1="19" y1="4" x2="21" y2="6"/>
          <line x1="16" y1="7" x2="18" y2="9"/>
        </svg>
      </div>
      <div class="card-label">계정 · ID/PW</div>
      <div class="card-sub">각종 계정 정보</div>
    </div>

    <!-- 카드 7: 계약서 관리 -->
    <div class="app-card" onclick="openContract(this)">
      <div class="card-icon">
        <svg viewBox="0 0 24 24">
          <path d="M14 3H6a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 3 14 8 20 8"/>
          <line x1="8" y1="12" x2="16" y2="12"/>
          <line x1="8" y1="16" x2="13" y2="16"/>
        </svg>
      </div>
      <div class="card-label">계약서 관리</div>
      <div class="card-sub">의장님 계약 문서</div>
    </div>

    <!-- 카드 8: 보험 관리 -->
    <div class="app-card" onclick="openApp('보험관리.html', '보험 관리', this)">
      <div class="card-icon">
        <svg viewBox="0 0 24 24">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          <polyline points="9 12 11 14 15 10"/>
        </svg>
      </div>
      <div class="card-label">보험 관리</div>
      <div class="card-sub">보험 현황 · 갱신</div>
    </div>

  </div>

  <div class="home-footer">앱을 선택해 바로 시작하세요</div>
</div>

<!-- ③ 비밀번호 모달 -->
<div class="modal-overlay" id="pw-modal" onclick="handleOverlayClick(event)">
  <div class="modal-card" id="pw-card">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24">
        <rect x="5" y="11" width="14" height="10" rx="2"/>
        <path d="M8 11V7a4 4 0 0 1 8 0v4"/>
        <circle cx="12" cy="16" r="1.2" fill="currentColor" stroke="none"/>
      </svg>
    </div>
    <div class="modal-title">계약서 관리</div>
    <div class="modal-desc">접근 비밀번호를 입력하세요</div>
    <input
      class="modal-input"
      id="pw-input"
      type="password"
      maxlength="20"
      placeholder="••••"
      onkeydown="if(event.key==='Enter') checkPassword()"
      autocomplete="off"
    />
    <div class="modal-error" id="pw-error"></div>
    <button class="modal-btn" onclick="checkPassword()">확인</button>
    <div class="modal-cancel" onclick="closeModal()">취소</div>
  </div>
</div>

<!-- ② 앱 화면 (iframe) -->
<div id="app-screen">
  <div class="app-topbar">
    <button class="back-btn" onclick="goHome()">
      <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      메인으로
    </button>
    <div class="topbar-dot"></div>
    <span class="topbar-title" id="topbar-title">—</span>
  </div>
  <iframe id="app-frame" src="" title="앱 화면"></iframe>
</div>

<script>
  const CONTRACT_PW = '2212';
  let pendingCard = null;
  let activeCard = null;

  function openContract(cardEl) {
    pendingCard = cardEl;
    document.getElementById('pw-input').value = '';
    document.getElementById('pw-error').textContent = '';
    document.getElementById('pw-modal').classList.add('open');
    setTimeout(() => document.getElementById('pw-input').focus(), 80);
  }

  function checkPassword() {
    const val = document.getElementById('pw-input').value;
    if (val === CONTRACT_PW) {
      const card = pendingCard;
      closeModal();
      openApp('계약서관리.html', '계약서 관리', card);
    } else {
      const input = document.getElementById('pw-input');
      const err   = document.getElementById('pw-error');
      err.textContent = '비밀번호가 올바르지 않습니다';
      input.classList.remove('shake');
      void input.offsetWidth;
      input.classList.add('shake');
      input.value = '';
      setTimeout(() => input.classList.remove('shake'), 400);
    }
  }

  function closeModal() {
    document.getElementById('pw-modal').classList.remove('open');
    pendingCard = null;
  }

  function handleOverlayClick(e) {
    if (e.target === document.getElementById('pw-modal')) closeModal();
  }

  function openApp(file, label, cardEl) {
    if (activeCard) activeCard.classList.remove('active');
    cardEl.classList.add('active');
    activeCard = cardEl;

    const homeScreen = document.getElementById('home-screen');
    const appScreen  = document.getElementById('app-screen');
    const frame      = document.getElementById('app-frame');
    const title      = document.getElementById('topbar-title');

    homeScreen.style.opacity = '0';
    homeScreen.style.transform = 'translateY(-12px)';

    setTimeout(() => {
      homeScreen.style.display = 'none';
      frame.src = file;
      title.textContent = label;
      appScreen.style.display = 'flex';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          appScreen.classList.add('visible');
        });
      });
    }, 300);
  }

  function goHome() {
    const homeScreen = document.getElementById('home-screen');
    const appScreen  = document.getElementById('app-screen');
    const frame      = document.getElementById('app-frame');

    appScreen.classList.remove('visible');

    setTimeout(() => {
      appScreen.style.display = 'none';
      frame.src = '';
      if (activeCard) { activeCard.classList.remove('active'); activeCard = null; }
      homeScreen.style.display = 'flex';
      homeScreen.style.opacity = '0';
      homeScreen.style.transform = 'translateY(12px)';
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          homeScreen.style.opacity = '1';
          homeScreen.style.transform = 'translateY(0)';
        });
      });
    }, 300);
  }
</script>
</body>
</html>
